<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Devil Wears Prada 2</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="assets/faviconfinale.png">

    <!-- FONT AWESOME ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>



    <!-- NAVIGATION -->

    <header id="navbar">

        <div class="left-nav">

            <a href="#">
                <i class="fa-solid fa-bars"></i> Menu
            </a>

            <a href="#">
                <i class="fa-solid fa-magnifying-glass"></i> Search
            </a>

        </div>



        <!-- LOGO -->

        <div class="logo">

            <a href="#">
                THE DEVIL WEARS PRADA 2
            </a>

        </div>



        <!-- RIGHT NAV -->

        <div class="right-nav">

            <a href="#">
                Contact Us
            </a>

        </div>

    </header>



    <!-- HERO VIDEO SECTION -->

    <section class="hero">

        <!-- VIDEO -->

        <video class="hero-video" id="heroVideo" autoplay muted loop playsinline>

            <source src="assets/tdwp trailer.mp4" type="video/mp4">

        </video>



        <!-- VIDEO CONTROLS -->

        <div class="video-controls">

            <!-- PLAY / PAUSE -->

            <button id="playPauseBtn">

                <i class="fa-solid fa-pause"></i>

            </button>



            <!-- VOLUME -->

            <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0">

        </div>



        <!-- HERO TEXT -->

        <div class="hero-text">

            <h1>OFFICIAL TRAILER</h1>

        </div>

    </section>



    <!-- FASHION SECTION -->

    <section class="content-section">

        <img src="assets/image 1.jpg" alt="Fashion Section">

        <div class="overlay">

            <p>Fashion</p>

            <h1>Closer Look at Outfits</h1>

            <a href="https://www.vogue.com/slideshow/all-the-costumes-from-the-devil-wears-prada-2" class="btn"
                target="_blank">
                SEE MORE
            </a>

        </div>

    </section>



    <!-- ICONIC SECTION -->

    <section class="content-section">

        <img src="assets/image 2.jpg" alt="Iconic Section">

        <div class="overlay">

            <p>Iconic</p>

            <h1>Greatest Quotes in the First Movie</h1>

            <a href="https://people.com/best-the-devil-wears-prada-2-quotes-11964256" class="btn" target="_blank">
                SEE MORE
            </a>

        </div>

    </section>



    <!-- JAVASCRIPT -->

    <script>

        /* NAVBAR EFFECT */

        window.addEventListener("scroll", function () {

            let navbar = document.getElementById("navbar");

            navbar.classList.toggle("sticky", window.scrollY > 50);

        });



        /* VIDEO */

        const video = document.getElementById("heroVideo");

        const playPauseBtn = document.getElementById("playPauseBtn");

        const volumeControl = document.getElementById("volumeControl");



        /* PLAY VIDEO AUTOMATICALLY */

        video.play();



        /* PLAY / PAUSE BUTTON */

        playPauseBtn.addEventListener("click", function () {

            if (video.paused) {

                video.play();

                playPauseBtn.innerHTML =
                    '<i class="fa-solid fa-pause"></i>';

            }

            else {

                video.pause();

                playPauseBtn.innerHTML =
                    '<i class="fa-solid fa-play"></i>';

            }

        });



        /* VOLUME CONTROL */

        volumeControl.addEventListener("input", function () {

            video.muted = false;

            video.volume = volumeControl.value;

        });

    </script>

    <!-- PAGINATION -->

    <div class="pagination-container">

        <a href="../Act 5/index.html" class="active-page">

            1

        </a>



        <a href="../Act 4/index.html">

            2

        </a>



        <a href="../Act 2/index.html">

            3

        </a>



        <a href="../Act 3/index.html">

            4

        </a>

    </div>

</body>

</html>
