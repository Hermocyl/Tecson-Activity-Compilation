<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Playlist</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="images/faviconfinale.png">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <!-- PLAYER SECTION (marquees layered behind the music player) -->
    <div class="player-section">

        <!-- TOP MARQUEE (behind) -->
        <marquee behavior="scroll" direction="right" scrollamount="20" class="top-marquee">
            RUNWAY RUNWAY RUNWAY RUNWAY RUNWAY
        </marquee>

        <!-- BOTTOM MARQUEE (behind) -->
        <marquee behavior="scroll" direction="left" scrollamount="20" class="bottom-marquee">
            RUNWAY RUNWAY RUNWAY RUNWAY RUNWAY
        </marquee>

        <!-- MAIN CONTAINER (in front) -->
        <div class="container">

            <!-- MUSIC PLAYER -->
            <div class="music-player">

                <!-- ALBUM IMAGE -->
                <img src="images/albumcoverfinal.jpg" alt="Album Cover" class="album-image">
                <!-- SONG TITLE -->
                <a href="https://youtu.be/XXIX2WnfbpE?si=7P0o9Jp0z-uIe3Xn" target="_blank" class="song-title">
                    RUNWAY
                </a>

                <!-- ARTIST -->
                <p class="artist-name">
                    Lady Gaga, Doechii
                </p>

                <!-- SOUND WAVES -->
                <div class="sound-wave">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <!-- AUDIO PLAYER -->
                <audio controls class="audio-player">
                    <source src="images/Lady Gaga, Doechii - Runway Audio.mp3" type="audio/mpeg">
                </audio>

            </div>

        </div>

    </div>

    <!-- SPOTIFY EMBED -->
    <div class="spotify-container">

        <iframe data-testid="embed-iframe" style="border-radius:12px"
            src="https://open.spotify.com/embed/album/5FKnRUB5lt7z5ac1lmu3BE?utm_source=generator" width="100%"
            height="152" frameBorder="0" allowfullscreen=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

    </div>

    <!-- YOUTUBE LINK -->
    <div class="youtube-link-container">

        <a href="https://www.youtube.com/watch?v=mzV32749X6A&list=PLxA687tYuMWiEUf8QkdQmsST1cHjnxwZz" target="_blank"
            class="youtube-link">

            Songs from Youtube

        </a>

    </div>

    <br>
    <br>
    <br>
    <br>
    <br>


    <!-- PAGINATION -->

    <div class="pagination-container">

        <a href="../Act 5/index.html">

        </a>



        <a href="../Act 4/index.html" class="active-page">

            2

        </a>



        <a href="../Act 2/index.html">

            3

        </a>



        <a href="../Act 3/index.html">

            4

        </a>

    </div>

</body>

</html>
